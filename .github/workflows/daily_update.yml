name: Daily DevSync Update

on:
  schedule:
    # This runs every day at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # This adds a "Run" button so we can test it manually!

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update log for 23ds2000027@ds.study.iitm.ac.in
        run: |
          echo "Last sync: $(date)" > daily_log.txt

      - name: Commit and Push changes
        run: |
          git config --local user.email "23ds2000027@ds.study.iitm.ac.in"
          git config --local user.name "DevSync Automation"
          git add daily_log.txt
          git commit -m "Automated daily sync for DevSync"
          git push
